<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>show-me · Claude Code X-Ray</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #fcfbf8;
    --ink: #0a0a0a;
    --ink-soft: #1f1f1f;
    --graphite: #4a4a4a;
    --stone: #9a9a9a;
    --hairline: #ececec;
    --hairline-soft: #f3f3f3;
  }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--canvas);
    font-family: 'Inter', -apple-system, system-ui, "Segoe UI", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  #toolbar {
    position: fixed; top: 24px; left: 24px; z-index: 10;
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: 16px;
    padding: 14px 16px;
    max-width: 320px;
  }
  #toolbar .project {
    font-size: 16px; font-weight: 500; line-height: 1.2;
    letter-spacing: -0.2px;
    color: var(--ink);
  }
  #toolbar .meta {
    font-size: 11px; font-weight: 400; line-height: 1.4;
    letter-spacing: 0.1px;
    color: var(--stone);
    margin-top: 4px;
  }
  #toolbar .search {
    margin-top: 12px;
    position: relative;
  }
  #toolbar .search input {
    font-family: inherit;
    font-size: 13px;
    width: 100%;
    box-sizing: border-box;
    padding: 8px 12px;
    border: 1px solid var(--hairline);
    border-radius: 9999px;
    background: var(--canvas);
    color: var(--ink);
    outline: none;
    transition: border-color 120ms ease;
  }
  #toolbar .search input:focus { border-color: var(--ink); }
  #toolbar .search input::placeholder { color: var(--stone); }
  #toolbar .search .count {
    margin-top: 6px;
    padding: 0 4px;
    font-size: 11px;
    line-height: 1.3;
    letter-spacing: 0.2px;
    color: var(--stone);
    min-height: 14px;
  }
  #toolbar .filters {
    margin-top: 14px;
    display: flex;
    gap: 6px;
  }
  #toolbar .filters button {
    font-family: inherit;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.4px; text-transform: uppercase;
    padding: 6px 14px;
    border: 1px solid var(--ink);
    border-radius: 9999px;
    background: var(--canvas);
    color: var(--ink);
    cursor: pointer;
    transition: background 120ms ease, color 120ms ease;
  }
  #toolbar .filters button:hover { background: var(--hairline-soft); }
  #toolbar .filters button.active {
    background: var(--ink);
    color: var(--canvas);
  }
  #zoom {
    position: fixed; bottom: 24px; right: 24px; z-index: 10;
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: 9999px;
    padding: 4px;
    display: flex; align-items: center; gap: 2px;
  }
  #zoom button {
    font-family: inherit;
    font-size: 13px; font-weight: 500;
    letter-spacing: 0.2px;
    min-width: 32px; height: 28px;
    padding: 0 10px;
    border: 0;
    border-radius: 9999px;
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    transition: background 120ms ease;
    display: inline-flex; align-items: center; justify-content: center;
  }
  #zoom button:hover { background: var(--hairline-soft); }
  #zoom button:active { background: var(--hairline); }
  #zoom .divider {
    width: 1px; height: 16px; background: var(--hairline);
  }
  #zoom .fit {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.4px; text-transform: uppercase;
    padding: 0 12px;
  }
  svg.markmap { width: 100vw; height: 100vh; display: block; }
  svg.markmap foreignObject {
    overflow: visible;
    font-size: 12px;
    line-height: 1.4;
  }
  svg.markmap foreignObject > div {
    font-size: 12px;
    line-height: 1.4;
  }
  svg.markmap circle {
    cursor: pointer;
  }
  svg.markmap a.open {
    color: var(--ink);
    text-decoration: underline;
    text-decoration-color: var(--hairline);
    text-underline-offset: 2px;
  }
  svg.markmap a.open:hover {
    text-decoration-color: var(--ink);
  }
  #search-results {
    position: fixed;
    inset: 0;
    padding: 130px 32px 32px 380px;
    overflow-y: auto;
    background: var(--canvas);
    z-index: 5;
    display: none;
    color: var(--ink);
  }
  #search-results.active { display: block; }
  #search-results ul {
    list-style: none;
    margin: 0;
    padding-left: 0;
  }
  #search-results ul.nested {
    padding-left: 14px;
    border-left: 1px solid var(--hairline-soft);
    margin-left: 6px;
  }
  #search-results li { padding: 1px 0; }
  #search-results .row {
    display: inline-flex;
    align-items: baseline;
    gap: 6px;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1.55;
    letter-spacing: -0.1px;
    cursor: default;
  }
  #search-results .row[data-toggle] { cursor: pointer; }
  #search-results .row[data-toggle]:hover { background: var(--hairline-soft); }
  #search-results .chev {
    display: inline-block;
    width: 12px;
    font-size: 10px;
    color: var(--stone);
    user-select: none;
  }
  #search-results .label { color: var(--ink); }
  #search-results .count {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: var(--graphite);
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: 9999px;
    padding: 0 6px;
    line-height: 1.5;
  }
  #search-results mark {
    background: #fff1c2;
    color: var(--ink);
    padding: 0 2px;
    border-radius: 2px;
  }
  #search-results a.open {
    color: var(--ink);
    text-decoration: underline;
    text-decoration-color: var(--hairline);
    text-underline-offset: 2px;
  }
  #search-results a.open:hover { text-decoration-color: var(--ink); }
  #search-results .empty {
    font-size: 13px;
    color: var(--stone);
  }
  body:has(#search-results.active) #zoom { display: none; }
  .chip {
    display: inline-flex;
    align-items: center;
    margin-left: 8px;
    padding: 1px 8px;
    border-radius: 9999px;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    line-height: 1.6;
    vertical-align: middle;
    white-space: nowrap;
  }
  .chip-override {
    border: 1px solid #d4a017;
    background: #fbf3d6;
    color: #6e5200;
  }
  .chip-count {
    border: 1px solid var(--hairline);
    background: var(--canvas);
    color: var(--graphite);
  }
</style>
</head>
<body dir="{{DIR}}">
<div id="toolbar">
  <div class="project">{{PROJECT_NAME}}</div>
  <div class="meta">{{HEADLINE}} · {{STAMP_DATE}}</div>
  <div class="search">
    <input id="search-input" type="search" placeholder="{{SEARCH_PLACEHOLDER}}" autocomplete="off" spellcheck="false">
    <div id="search-count" class="count"></div>
  </div>
  <div class="filters">
    <button data-filter="all" class="active">{{FILTER_ALL}}</button>
    <button data-filter="global">{{FILTER_GLOBAL}}</button>
    <button data-filter="project">{{FILTER_PROJECT}}</button>
  </div>
</div>
<div id="zoom">
  <button data-zoom="out" aria-label="Zoom out">−</button>
  <div class="divider"></div>
  <button data-zoom="fit" class="fit" aria-label="Fit to screen">{{ZOOM_FIT_LABEL}}</button>
  <div class="divider"></div>
  <button data-zoom="in" aria-label="Zoom in">+</button>
</div>
<svg id="markmap" class="markmap"></svg>
<div id="search-results" aria-live="polite"></div>

<script type="text/template" id="markmap-md">
{{MARKMAP_MD}}
</script>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.18"></script>
<script>
(function () {
  const md = document.getElementById('markmap-md').textContent;
  const { Transformer, Markmap } = window.markmap;
  const transformer = new Transformer();
  const { root } = transformer.transform(md);

  const originalChildren = root.children ? root.children.slice() : [];

  const svg = document.getElementById('markmap');
  const resultsPanel = document.getElementById('search-results');
  const MM_OPTIONS = { maxWidth: 360, duration: 200, paddingX: 16 };
  let mm = Markmap.create(svg, { ...MM_OPTIONS, initialExpandLevel: 2 }, root);

  resultsPanel.addEventListener('click', (e) => {
    if (e.target.closest && e.target.closest('a')) return;
    const row = e.target.closest && e.target.closest('.row[data-toggle]');
    if (!row) return;
    const li = row.parentElement;
    const sub = li.querySelector(':scope > .sub');
    if (!sub) return;
    const expanded = li.dataset.expanded === 'true';
    sub.hidden = expanded;
    li.dataset.expanded = String(!expanded);
    const chev = row.querySelector('.chev');
    if (chev) chev.textContent = expanded ? '▸' : '▾';
  });

  function matchesFilter(child, mode) {
    const text = (child.content || '').toLowerCase();
    const isXray = text.includes('x-ray');
    if (mode === 'all') return true;
    if (mode === 'global') return text.includes('global') || isXray;
    if (mode === 'project') return text.includes('project') || isXray;
    return true;
  }

  let currentFilter = 'all';
  let currentQuery = '';

  function nodeText(node) {
    const tmp = document.createElement('div');
    tmp.innerHTML = node.content || '';
    return (tmp.textContent || '').toLowerCase();
  }

  function escapeRegex(s) {
    return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  // Walk only text nodes so existing <a class="open"> anchors and other
  // markup inside node.content stay intact when we wrap matches in <mark>.
  function highlightMatches(rootEl, q) {
    if (!q) return;
    const re = new RegExp(escapeRegex(q), 'gi');
    const walker = document.createTreeWalker(rootEl, NodeFilter.SHOW_TEXT, {
      acceptNode: (n) => re.test(n.nodeValue) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT,
    });
    const targets = [];
    let n;
    while ((n = walker.nextNode())) targets.push(n);
    for (const t of targets) {
      const span = document.createElement('span');
      span.innerHTML = t.nodeValue.replace(re, (m) => '<mark>' + m + '</mark>');
      t.parentNode.replaceChild(span, t);
    }
  }

  function renderListView(nodes, parent, depth) {
    if (!nodes || !nodes.length) return;
    const ul = document.createElement('ul');
    if (depth > 0) ul.classList.add('nested');
    for (const node of nodes) {
      const hasChildren = node.children && node.children.length > 0;
      const li = document.createElement('li');
      li.className = hasChildren ? 'branch' : 'leaf';

      const row = document.createElement('span');
      row.className = 'row';

      let chev = null;
      if (hasChildren) {
        chev = document.createElement('span');
        chev.className = 'chev';
        chev.textContent = '▸';
        row.appendChild(chev);
        row.dataset.toggle = '';
      }

      const label = document.createElement('span');
      label.className = 'label';
      label.innerHTML = node.content || '';
      row.appendChild(label);

      if (hasChildren && node._matchCount) {
        const count = document.createElement('span');
        count.className = 'count';
        count.textContent = node._matchCount;
        row.appendChild(count);
      }

      li.appendChild(row);

      if (hasChildren) {
        const sub = document.createElement('div');
        sub.className = 'sub';
        const startExpanded = depth < 1;
        sub.hidden = !startExpanded;
        li.dataset.expanded = String(startExpanded);
        if (startExpanded && chev) chev.textContent = '▾';
        renderListView(node.children, sub, depth + 1);
        li.appendChild(sub);
      }

      ul.appendChild(li);
    }
    parent.appendChild(ul);
  }

  // Search prunes in place (preserves node identity so markmap's internal
  // state — including its own fold tracking — stays correct). The original
  // children array of every touched node is captured before mutation, then
  // restored on the next rerender.
  const originalChildState = new Map();

  function captureChildren(node) {
    if (!originalChildState.has(node)) {
      originalChildState.set(node, node.children ? node.children.slice() : []);
    }
  }

  function restoreAllChildren() {
    originalChildState.forEach((kids, node) => { node.children = kids; });
    originalChildState.clear();
  }

  function pruneInPlace(node, q) {
    const selfMatch = nodeText(node).includes(q);
    const kept = [];
    let count = selfMatch ? 1 : 0;
    for (const child of (node.children || [])) {
      const childCount = pruneInPlace(child, q);
      if (childCount > 0) {
        kept.push(child);
        count += childCount;
      }
    }
    if (count > 0) {
      captureChildren(node);
      node.children = kept;
      node._matchCount = count;
      if (node.payload) node.payload.fold = 0;
    }
    return count;
  }

  function rerender() {
    restoreAllChildren();

    let topLevel = [];
    let matchCount = 0;
    for (const child of originalChildren) {
      if (!matchesFilter(child, currentFilter)) continue;
      if (currentQuery) {
        const childCount = pruneInPlace(child, currentQuery);
        if (childCount > 0) {
          topLevel.push(child);
          matchCount += childCount;
        }
      } else {
        topLevel.push(child);
      }
    }
    root.children = topLevel;

    if (currentQuery) {
      // Search results: render a clean nested list, hide the markmap.
      resultsPanel.innerHTML = '';
      if (matchCount === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = '{{SEARCH_NO_MATCH}}';
        resultsPanel.appendChild(empty);
      } else {
        renderListView(root.children, resultsPanel, 0);
        highlightMatches(resultsPanel, currentQuery);
      }
      resultsPanel.classList.add('active');
      svg.style.display = 'none';
    } else {
      // No query: show the markmap. Recreate only here (on Esc / empty /
      // filter change) — never on every keystroke.
      resultsPanel.classList.remove('active');
      resultsPanel.innerHTML = '';
      svg.style.display = '';
      while (svg.firstChild) svg.removeChild(svg.firstChild);
      mm = Markmap.create(svg, { ...MM_OPTIONS, initialExpandLevel: 2 }, root);
      mm.fit();
    }
    updateSearchCount(matchCount);
  }

  function updateSearchCount(n) {
    const el = document.getElementById('search-count');
    if (!el) return;
    if (!currentQuery) { el.textContent = ''; return; }
    el.textContent = n === 0
      ? '{{SEARCH_NO_MATCH}}'
      : '{{SEARCH_MATCH_PREFIX}}' + n + '{{SEARCH_MATCH_SUFFIX}}';
  }

  document.querySelectorAll('#toolbar .filters button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#toolbar .filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      rerender();
    });
  });

  const searchInput = document.getElementById('search-input');
  let searchDebounce = null;
  searchInput.addEventListener('input', (e) => {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => {
      currentQuery = e.target.value.trim().toLowerCase();
      rerender();
    }, 120);
  });
  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      searchInput.value = '';
      currentQuery = '';
      rerender();
      searchInput.blur();
    }
  });

  function zoom(action) {
    if (action === 'in') mm.rescale(1.25);
    else if (action === 'out') mm.rescale(0.8);
    else if (action === 'fit') mm.fit();
  }

  document.querySelectorAll('#zoom button').forEach(btn => {
    btn.addEventListener('click', () => zoom(btn.dataset.zoom));
  });

  document.addEventListener('keydown', (e) => {
    const target = e.target;
    const isTyping = target && (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.isContentEditable);
    if (e.key === '/' && !isTyping) {
      e.preventDefault();
      searchInput.focus();
      searchInput.select();
      return;
    }
    if (isTyping) return;
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    if (e.key === '+' || e.key === '=') { e.preventDefault(); zoom('in'); }
    else if (e.key === '-' || e.key === '_') { e.preventDefault(); zoom('out'); }
    else if (e.key === '0') { e.preventDefault(); zoom('fit'); }
  });

  const HIT_RADIUS = 28;

  function nearestCircle(clientX, clientY) {
    let closest = null;
    let minDist = Infinity;
    svg.querySelectorAll('circle').forEach(c => {
      const r = c.getBoundingClientRect();
      if (r.width === 0) return;
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const d = Math.hypot(cx - clientX, cy - clientY);
      if (d < minDist) { minDist = d; closest = c; }
    });
    return minDist <= HIT_RADIUS ? closest : null;
  }

  svg.addEventListener('click', (e) => {
    if (e.target.tagName === 'circle') return;
    if (e.target.closest && e.target.closest('a')) return;
    const target = nearestCircle(e.clientX, e.clientY);
    if (target) {
      target.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true }));
    }
  });

  let rafPending = false;
  svg.addEventListener('mousemove', (e) => {
    if (rafPending) return;
    rafPending = true;
    requestAnimationFrame(() => {
      rafPending = false;
      svg.style.cursor = nearestCircle(e.clientX, e.clientY) ? 'pointer' : '';
    });
  });
})();
</script>
</body>
</html>
